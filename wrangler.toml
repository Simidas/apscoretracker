name = "apscoretracker"
main = "./dist/_worker.js/index.js"
compatibility_date = "2024-05-12"
compatibility_flags = ["nodejs_compat"]

# Static assets binding
[site]
bucket = "./dist"

# Uncomment when you need KV for data storage
# [[kv_namespaces]]
# binding = "APST_KV"
# id = "your-kv-namespace-id"

# Uncomment when you need D1 for database
# [[d1_databases]]
# binding = "APST_DB"
# database_name = "apscoretracker"
# database_id = "your-d1-database-id"
